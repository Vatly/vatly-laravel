name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: true
      matrix:
        php: [8.3, 8.4, 8.5]
        laravel: [12.*, 13.*]

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          # TEMPORARY (remove once vatly/vatly-fluent-php v0.8.0-alpha.1 is tagged on Packagist):
          # point at fluent's feat/v0.8-remove-billable branch via VCS and alias it to the
          # constraint declared in composer.json so the rest of the install resolves.
          composer config repositories.fluent vcs https://github.com/vatly/vatly-fluent-php
          composer require "vatly/vatly-fluent-php:dev-feat/v0.8-remove-billable as 0.8.0-alpha.1" --no-interaction --no-update
          composer require "illuminate/support:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
