name: Trigger Docs Sync

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger vatly-docs sync
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_SYNC_TOKEN }}
          repository: vatly/vatly-docs
          event-type: sync-laravel-docs
